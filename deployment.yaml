apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: tranthanhvt0982/test-product-service:latest
          ports:
            - containerPort: 8083
              name: http
            - containerPort: 9083
              name: http-admin
          livenessProbe:
            httpGet:
              path: "/healthcheck"
              port: http-admin
            initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 8083
      targetPort: 8083
    - name: "http"
      port: 8083
      targetPort: "http"
    - name: "http-admin"
      port: 9083
      targetPort: "http-admin"